<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>{{ partial "head.html" . }}{{ partial "schema.html" . }}</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-title">{{ .Site.Title }}</a>
  </div>
  {{ partial "adsense.html" (dict "Site" .Site "slot" "adsense_header") }}
</header>
<main class="container">{{ block "main" . }}{{ end }}</main>
<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }} &middot; <a href="/privacy/">Privacy Policy</a></p>
  </div>
</footer>
</body>
</html>
